<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>予約照会</title>
</head>
<body>
    <h1>予約照会</h1>

    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="post">
        <div>
            <label>姓<br>
                <input type="text" name="last_name" value="{{ auth_data['last_name'] }}" required>
            </label>
        </div>
        <div>
            <label>名<br>
                <input type="text" name="first_name" value="{{ auth_data['first_name'] }}" required>
            </label>
        </div>
        <div>
            <label>電話番号<br>
                <input type="tel" name="phone" value="{{ auth_data['phone'] }}" required>
            </label>
        </div>
        <button type="submit">次へ</button>
    </form>

    <p><a href="{{ url_for('top.index') }}">Topへ</a></p>
</body>
</html>
